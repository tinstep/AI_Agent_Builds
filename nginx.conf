# Nginx Configuration for Economic Data API MVP
# Place this file at: /etc/nginx/sites-available/economic-api (or your nginx conf.d directory)

upstream economic_api_backend {
    server 127.0.0.1:9004;  # Points to our FastAPI server
}

server {
    listen 80;
    listen [::]:80;
    server_name api.localhost;  # Change to your domain (e.g., api.yourcompany.com)

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        # Proxy all requests to the FastAPI backend
        proxy_pass http://economic_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Optional: Health check endpoint for monitoring
    location /health {
        access_log off;
        proxy_pass http://economic_api_backend/health;
    }
}

