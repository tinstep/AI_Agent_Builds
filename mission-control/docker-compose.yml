services:
  postgres:
    image: postgres:16
    container_name: mission-control-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mission_control
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - mission-control-postgres:/var/lib/postgresql/data

volumes:
  mission-control-postgres:
